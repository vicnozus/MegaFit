<!DOCTYPE html>
<!-- Define que o documento é HTML5 -->

<html lang="en">
<!-- Início do site | "en" = inglês (pode mudar pra "pt-br" se quiser) -->

<head>
    <meta charset="UTF-8">
    <!-- Permite usar acentos e caracteres especiais -->

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap">
    <!-- Importa as fontes do Google (Orbitron = futurista | Poppins = moderna) -->

    <link rel="stylesheet" href="style.css">
    <!-- Conecta seu CSS ao HTML -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz o site se adaptar ao celular (RESPONSIVIDADE) -->

    <title>Introdução</title>
    <!-- Nome que aparece na aba do navegador -->
</head>

<body>
    <!-- Tudo que aparece na tela fica aqui dentro -->

    <!-- ===== HEADER (barra superior) ===== -->
    <header class="bloco">
        <!-- Usa a classe .bloco que você estilizou no CSS -->

        <div class="logo">
            <!-- Container da logo -->

            <span class="Mega">Mega</span> 
            <!-- Parte 1 do nome -->

            <span class="Fit">Fit</span>
            <!-- Parte 2 do nome -->
        </div>
    </header>

    <!-- ===== CONTEÚDO PRINCIPAL ===== -->
    <h1>Mid Academy</h1>
    <!-- Título principal do site -->

    <p class="slogan">
        Mantenha Seu Foco E Cuide Do Seu Corpo
    </p>
    <!-- Frase motivacional -->
    
</body>

<script src="script.js"></script>
<!-- Conecta o JavaScript (mesmo que ainda esteja vazio) -->

</html>
