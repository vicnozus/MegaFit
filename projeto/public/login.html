<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="container">
    <div class="login-box">
      <h2>Login</h2>

      <form id="loginForm">
        <input type="email" id="email" placeholder="Gmail" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
