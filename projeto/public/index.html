<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mid Academy</title>

    <!-- FONTES -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="bloco">

        <!-- LOGO -->
        <div class="logo">

            <span class="Mega">Mega</span>
            <span class="Fit">Fit</span>

        </div>

        <!-- BOTÕES -->
        <div class="nav-buttons">

            <button id="loginBtn">
                Login
            </button>

            <button id="cadastroBtn">
                Cadastro
            </button>

        </div>

    </header>

    <!-- ===== HERO ===== -->
    <section class="hero">

        <div class="hero-content">

            <span class="mini-title">
                Sua rotina inteligente
            </span>

            <h1>
                Organize sua rotina.
                Evolua todos os dias.
            </h1>

            <p>
                Planeje hábitos, acompanhe metas
                e melhore sua produtividade.
            </p>

            <div class="hero-buttons">

                <button class="btn-primary">
                    Começar Agora
                </button>

            </div>

        </div>

    </section>

    <!-- ===== CARDS ===== -->
    <section class="cards-container">

        <!-- CARD 1 -->
        <div class="card">

            <img
                src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1000"
                alt="Treino">

            <div class="card-content">

                <h2>Foque Em Você</h2>

            </div>

        </div>

        <!-- CARD 2 -->
        <div class="card">

            <img
                src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1000"
                alt="Academia">

            <div class="card-content">

                <h2>Não Desista</h2>

            </div>


        </div>

    </section>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>

</html>
