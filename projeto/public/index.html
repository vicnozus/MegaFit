<!DOCTYPE html>
<!-- Define que o documento é HTML5 -->

<html lang="pt-br">
<!-- Idioma do site -->

<head>

    <meta charset="UTF-8">
    <!-- Permite caracteres especiais -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Responsividade -->

    <title>Mid Academy</title>

    <!-- FONTES -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="bloco">

        <!-- LOGO -->
        <div class="logo">

            <span class="Mega">Mega</span>
            <span class="Fit">Fit</span>

        </div>

        <!-- BOTÕES -->
        <div class="nav-buttons">

            <button id="loginBtn">
                Login
            </button>

            <button id="cadastroBtn">
                Cadastro
            </button>

        </div>

    </header>

    <!-- ===== CONTEÚDO ===== -->

    <section class="conteudo">

        <h1>Mid Academy</h1>

        <p class="slogan">
            Mantenha Seu Foco E Cuide Do Seu Corpo
        </p>

    </section>

    <!-- ===== CARDS ===== -->

    <section class="cards-container">

        <!-- CARD A -->
        <div class="card">

            <img 
            src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1000"
            alt="Treino">

            <div class="card-content">

                <h2>Foque Em Você</h2>

               
            </div>

        </div>

        <!-- CARD B -->
        <div class="card">

            <img
            src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1000"
            alt="Academia">

            <div class="card-content">

                <h2>Não Desista</h2>

               

            </div>

        </div>

    </section>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>
</html>
